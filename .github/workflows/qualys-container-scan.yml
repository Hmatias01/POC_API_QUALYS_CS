name: Qualys Container Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  qualys-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Qualys Container Security Scan
        env:
          QUALYS_ACCESS_TOKEN: ${{ secrets.QUALYS_ACCESS_TOKEN }}
          QUALYS_POD: US3
          IMAGE_NAME: poc-api-matias
          IMAGE_TAG: latest
          POLICY_TAGS: "REPOSITÓRIO DO GITHUB"
        run: |
          chmod +x qualys_container_scan.sh
          ./qualys_container_scan.sh
